<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopFront — running on Amazon ECS Fargate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      padding: 48px 24px 56px;
      text-align: center;
    }
    header h1 { font-size: 2.4rem; color: #fff; letter-spacing: -0.5px; }
    header p { color: #ede9fe; margin-top: 8px; font-size: 1.05rem; }
    .badge {
      display: inline-block; margin-top: 16px; padding: 6px 14px;
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px; font-size: 0.85rem; color: #fff; backdrop-filter: blur(4px);
    }
    main { max-width: 960px; margin: -32px auto 0; padding: 0 24px 48px; }
    .grid {
      display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 16px;
      padding: 24px; transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .card:hover { transform: translateY(-4px); border-color: #6366f1; }
    .card .emoji { font-size: 2.2rem; }
    .card h3 { margin: 12px 0 6px; font-size: 1.1rem; color: #f8fafc; }
    .card .price { font-size: 1.35rem; font-weight: 700; color: #a5b4fc; }
    .card button {
      margin-top: 16px; width: 100%; padding: 10px; border: none; border-radius: 10px;
      background: #6366f1; color: #fff; font-weight: 600; cursor: pointer;
      transition: background 0.15s ease;
    }
    .card button:hover { background: #4f46e5; }
    footer {
      max-width: 960px; margin: 32px auto 0; padding: 20px 24px 48px;
      text-align: center; color: #94a3b8; font-size: 0.85rem;
    }
    footer code { color: #a5b4fc; background: #1e293b; padding: 2px 8px; border-radius: 6px; }
    .arch { margin-top: 8px; color: #64748b; }
  </style>
</head>
<body>
  <header>
    <h1>🛒 ShopFront</h1>
    <p>A containerized microservice storefront</p>
    <span class="badge">☁️ Running on Amazon ECS Fargate</span>
  </header>

  <main>
    <div class="grid" id="products">
      <p>Loading products…</p>
    </div>
  </main>

  <footer>
    <div id="served-by">Connecting to backend…</div>
    <div class="arch">Browser → Application Load Balancer → ECS Fargate task → this response</div>
  </footer>

  <script>
    const EMOJIS = ["👟", "🧦", "🍶", "🎒", "🧢", "🧤"];

    async function load() {
      try {
        const res = await fetch("/products");
        const data = await res.json();
        const grid = document.getElementById("products");
        grid.innerHTML = "";
        data.products.forEach((p, i) => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="emoji">${EMOJIS[i % EMOJIS.length]}</div>
            <h3>${p.name}</h3>
            <div class="price">$${p.price.toFixed(2)}</div>
            <button>Add to cart</button>`;
          grid.appendChild(card);
        });
        document.getElementById("served-by").innerHTML =
          `Served by Fargate task <code>${data.served_by}</code>`;
      } catch (e) {
        document.getElementById("products").innerHTML =
          "<p>Could not reach the backend.</p>";
      }
    }
    load();
  </script>
</body>
</html>
