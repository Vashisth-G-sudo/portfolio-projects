name: Build and Deploy to ECS

# Deploys the ShopFront app (project 01) on every push to main.
on:
  push:
    branches: [main]
    paths:
      - "01-ecs-fargate-microservices/app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shopfront
  ECS_CLUSTER: shopfront
  ECS_SERVICE: shopfront
  ECS_CONTAINER: app

# OIDC: GitHub gets short-lived AWS credentials by assuming a role.
# No long-lived access keys stored as secrets.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE" 01-ecs-fargate-microservices/app
          docker push "$IMAGE"
          # Also push a moving :latest tag for convenience.
          docker tag "$IMAGE" "$REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Render new task definition
        id: taskdef
        run: |
          # Pull the current task def, swap in the new image, strip read-only fields.
          aws ecs describe-task-definition \
            --task-definition "$ECS_SERVICE" \
            --query 'taskDefinition' --output json > taskdef.json
          jq --arg IMG "${{ steps.build.outputs.image }}" \
            '.containerDefinitions[0].image = $IMG
             | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)' \
            taskdef.json > new-taskdef.json
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy (rolling update)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.taskdef.outputs.arn }}"
          # Wait until the new tasks are healthy and the deployment settles.
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
